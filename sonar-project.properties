# ============================================================
# sonar-project.properties
# Tells the SonarQube scanner what to scan and how
# ============================================================

# Unique project key in your SonarQube dashboard
sonar.projectKey=monorepo-cicd

# Display name shown in SonarQube UI
sonar.projectName=Monorepo CI/CD Project

# Version (can also be injected dynamically via CI)
sonar.projectVersion=1.0

# Root sources to scan (covers both frontend and backend)
sonar.sources=src

# Exclude test files from the main source scan
sonar.exclusions=**/node_modules/**,**/*.test.js

# Point to test files separately for coverage reporting
sonar.tests=src/backend
sonar.test.inclusions=**/*.test.js

# Language hints
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
