# ============================================================
# Production-Grade CI/CD Pipeline for Monorepo
# Covers: Matrix Testing | SonarQube | Deployment | Releases
# ============================================================

name: Monorepo CI/CD Pipeline

# ─────────────────────────────────────────────────────────────
# REQUIREMENT 1 — Workflow Triggers & Monorepo Optimization
# ─────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'

  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # Matches: v1.0.0, v2.3.1, etc.

# ─────────────────────────────────────────────────────────────
# REQUIREMENT 5 — Repo-level write permission for releases
# ─────────────────────────────────────────────────────────────
permissions:
  contents: write

# ─────────────────────────────────────────────────────────────
# REQUIREMENT 2 — Matrix Testing Job (test_matrix)
# Tests the backend across Node.js 18.x, 20.x, and 22.x
# ─────────────────────────────────────────────────────────────
jobs:
  test_matrix:
    name: "Test Backend — Node ${{ matrix.node-version }}"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]   # 3 parallel runners
      fail-fast: false                        # All versions run even if one fails

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'                         # REQUIREMENT 2 — Cache npm dependencies
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        working-directory: src/backend
        run: npm ci                            # Clean install from lock file

      - name: Run backend tests
        working-directory: src/backend
        run: npm test

  # ─────────────────────────────────────────────────────────────
  # REQUIREMENT 3 — SonarQube Analysis Job (runs in parallel)
  # ─────────────────────────────────────────────────────────────
  sonarqube_analysis:
    name: "SonarQube Code Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history for SonarQube)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                       # REQUIREMENT 3 — Full git history

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}         # From GitHub Secrets
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}   # ngrok/localtunnel URL

  # ─────────────────────────────────────────────────────────────
  # REQUIREMENT 4 — Deployment Simulation (sequential)
  # Only runs AFTER both test_matrix AND sonarqube_analysis pass
  # ─────────────────────────────────────────────────────────────
  simulate_deployment:
    name: "Simulate Deployment"
    runs-on: ubuntu-latest
    needs: [test_matrix, sonarqube_analysis]   # REQUIREMENT 4 — Both must pass first

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulate deployment to staging
        run: |
          echo "=========================================="
          echo "  ✅ All checks passed. Starting deploy..."
          echo "=========================================="
          echo "  Backend  → Deploying src/backend/"
          echo "  Frontend → Deploying src/frontend/"
          echo "  Target   → Staging Environment"
          sleep 3
          echo "  🚀 Deployment simulation complete!"
          echo "=========================================="

      - name: Verify deployed frontend artifact
        run: |
          echo "Checking frontend build..."
          cat src/frontend/index.html
          echo "✅ Frontend verified."

  # ─────────────────────────────────────────────────────────────
  # REQUIREMENT 5 — Automated GitHub Release
  # Runs ONLY on version tags (e.g. v1.0.0), after deployment
  # ─────────────────────────────────────────────────────────────
  create_release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [simulate_deployment]

    # REQUIREMENT 5 — Tag restriction: only fires on version tags
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for auto-generating release notes from commits

      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true         # Auto-generates changelog from commits
          draft: false
          prerelease: false
